<body>
  <section class="titulos">
    <h1>Sistema de Autenticación en Angular</h1>
    <h2>ASP .Net Core y Microsoft Identity</h2>
  </section>
  <section class="contenido">
    <article>
      <span>¿Ya tienes cuenta?</span>
      <button type="button" class="login" (click)="isLoginModalActive.set(true)">
        Login
      </button>
    </article>
    <article>
      <span>¿Eres nuevo?</span>
      <button type="button" class="registro" (click)="isRegistroModalActive.set(true)">
        Registro
      </button>
    </article>
  </section>
</body>

@if( isLoginModalActive() ){
    <app-login-modal  (cerrar)="isLoginModalActive.set(false)" />
}

@if ( isRegistroModalActive() ) {
  <app-registro-modal />
}
